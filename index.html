        async function getTodaysCode() {
            try {
                const today = new Date();
                const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
                
                // Use Gist API to fetch from a public collection
                const response = await fetch(
                    'https://api.github.com/repos/awesome-selfhosted/awesome-selfhosted/contents/README.md'
                );
                
                if (response.ok) {
                    const data = await response.json();
                    const content = atob(data.content);
                    const snippets = content.split('\n').filter(line => line.includes('```'));
                    
                    if (snippets.length > 0) {
                        return {
                            language: "Code Snippet",
                            difficulty: dayOfYear % 3 === 0 ? "Hard" : dayOfYear % 2 === 0 ? "Medium" : "Easy",
                            title: "Daily Code from Repository",
                            code: snippets[dayOfYear % snippets.length],
                            explanation: "Code snippet fetched from public GitHub repository - updated daily!"
                        };
                    }
                }
                
                // Alternative: Use public code dataset
                const languages = ['python', 'javascript', 'java', 'cpp', 'go', 'rust', 'ruby', 'sql'];
                const lang = languages[dayOfYear % languages.length];
                
                const codeResponse = await fetch(
                    `https://raw.githubusercontent.com/TheAlgorithms/${lang}/master/README.md`
                );
                
                if (codeResponse.ok) {
                    const codeData = await codeResponse.text();
                    const lines = codeData.split('\n');
                    
                    return {
                        language: lang.charAt(0).toUpperCase() + lang.slice(1),
                        difficulty: dayOfYear % 3 === 0 ? "Hard" : dayOfYear % 2 === 0 ? "Medium" : "Easy",
                        title: `Algorithm from TheAlgorithms/${lang}`,
                        code: lines.slice(0, 20).join('\n'),
                        explanation: `Code from TheAlgorithms repository - fetched live daily!`
                    };
                }
            } catch (error) {
                console.log("Using fallback snippets");
            }

            // Fallback
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
            return codeSnippets[dayOfYear % codeSnippets.length];
        }

        function generateQRCode(url) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
        }

            const root = document.getElementById('root');

            root.innerHTML = `

                    <div class="max-w-2xl mx-auto">
                        <div class="text-center mb-12">
                            <h1 class="text-4xl font-bold text-white mb-2">Daily Code Burst</h1>

                            <div class="bg-slate-700 px-6 py-4 flex justify-between items-center">

                            </div>

                            <div class="px-6 pt-6">
                                <h2 class="text-2xl font-semibold text-white">${code.title}</h2>
                            </div>

                            <div class="px-6 py-4">

                            <div class="px-6 pb-4">

                                </p>
                            </div>

                            <div class="px-6 pb-6 flex gap-3">

                                    📋 Copy Code
                                </button>
                                <button id="shareBtn" class="flex items-center gap-2 flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition-colors font-medium">
                                    🔗 Share
                                </button>
                                <button id="qrBtn" class="flex items-center gap-2 flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition-colors font-medium">
                                    📱 QR Code
                                </button>
                            </div>

                            <div id="qrContainer" class="hidden px-6 pb-6 border-t border-slate-700">
                                <div class="flex flex-col items-center gap-4">
                                    <p class="text-slate-300 text-sm">Scan to share with friends</p>
                                    <img src="${generateQRCode(window.location.href)}" alt="QR Code" class="border-4 border-slate-600 rounded">
                                    <button id="hideQrBtn" class="text-slate-400 hover:text-slate-300 text-sm">
                                        Hide QR Code
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-8 text-slate-500 text-sm">
                            <p>A new code snippet every day • Share with friends</p>
                        </div>
                    </div>
                </div>
            `;

            // Event listeners
            document.getElementById('copyBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(code.code);
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = '📋 Copy Code';
                }, 2000);
            });

            document.getElementById('shareBtn').addEventListener('click', () => {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({
                        title: "Daily Code Burst",
                        text: `Check out today's code: ${code.title}`,
                        url: url
                    });
                } else {
                    navigator.clipboard.writeText(url);
                    alert("Link copied to clipboard!");
                }
            });

            document.getElementById('qrBtn').addEventListener('click', () => {
                document.getElementById('qrContainer').classList.toggle('hidden');
            });

            document.getElementById('hideQrBtn').addEventListener('click', () => {
                document.getElementById('qrContainer').classList.add('hidden');
            });
        }

        // Initialize
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-6 flex items-center justify-center">
                <div class="text-white text-center">
                    <h1 class="text-2xl font-bold mb-2">Daily Code Burst</h1>
                    <p class="text-slate-400">Loading today's code from the internet...</p>
                </div>
            </div>
        `;

        getTodaysCode().then(code => {
            renderApp(code);
        });
