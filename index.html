<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Code Burst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Fallback snippets in case API fails
        const fallbackSnippets = [
            {
                language: "Python",
                difficulty: "Easy",
                title: "Reverse a String",
                code: `def reverse_string(s):
    return s[::-1]

result = reverse_string("Hello, World!")
print(result)  # !dlroW ,olleH`,
                explanation: "Python slice notation with step -1 reverses the string."
            },
            {
                language: "JavaScript",
                difficulty: "Easy",
                title: "Check for Even Number",
                code: `const isEven = (num) => num % 2 === 0;
console.log(isEven(4));  // true`,
                explanation: "Using modulo operator to check divisibility by 2."
            }
        ];

        async function getTodaysCode() {
            try {
                const today = new Date();
                const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
                
                // Use RapidAPI's code snippet API
                const languages = ['python', 'javascript', 'java', 'cpp', 'go', 'rust', 'ruby', 'sql'];
                const language = languages[dayOfYear % languages.length];
                
                // Fallback to a simpler approach - use a curated list from a public source
                const response = await fetch(
                    `https://api.github.com/repos/30-seconds/30-seconds-of-code/contents/snippets?per_page=100`,
                    {
                        headers: {
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        const file = data[dayOfYear % data.length];
                        const contentResponse = await fetch(file.download_url);
                        const content = await contentResponse.text();
                        
                        return {
                            language: "JavaScript",
                            difficulty: dayOfYear % 3 === 0 ? "Hard" : dayOfYear % 2 === 0 ? "Medium" : "Easy",
                            title: file.name.replace('.md', ''),
                            code: content.substring(0, 300),
                            explanation: "Code snippet from 30-seconds-of-code repository - updated daily!"
                        };
                    }
                }
            } catch (error) {
                console.log("API Error, using fallback:", error);
            }

            // Fallback if API fails
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
            return fallbackSnippets[dayOfYear % fallbackSnippets.length];
        }

        function generateQRCode(url) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
        }

        function initApp() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-6 flex items-center justify-center">
                    <div class="text-white">
                        <h1 class="text-2xl font-bold mb-2">Daily Code Burst</h1>
                        <p class="text-slate-400">Loading today's code...</p>
                    </div>
                </div>
            `;

            getTodaysCode().then(code => {
                renderApp(code);
            });
        }

            root.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-6">
                    <div class="max-w-2xl mx-auto">
                        <div class="text-center mb-12">
                            <h1 class="text-4xl font-bold text-white mb-2">Daily Code Burst</h1>
                            <p class="text-slate-400">Your daily dose of code inspiration</p>
                        </div>

                        <div class="bg-slate-800 rounded-lg shadow-2xl overflow-hidden border border-slate-700">
                            <div class="bg-slate-700 px-6 py-4 flex justify-between items-center">
                                <div class="flex gap-4">
                                    <span class="inline-block bg-blue-600 text-white px-3 py-1 rounded text-sm font-medium">
                                        ${code.language}
                                    </span>
                                    <span class="inline-block bg-amber-600 text-white px-3 py-1 rounded text-sm font-medium">
                                        ${code.difficulty}
                                    </span>
                                </div>
                            </div>

                            <div class="px-6 pt-6">
                                <h2 class="text-2xl font-semibold text-white">${code.title}</h2>
                            </div>

                            <div class="px-6 py-4">
                                <pre class="bg-slate-900 text-slate-100 p-4 rounded overflow-x-auto text-sm font-mono leading-relaxed"><code>${code.code}</code></pre>
                            </div>

                            <div class="px-6 pb-4">
                                <p class="text-slate-300 text-sm leading-relaxed">
                                    <span class="font-semibold text-slate-200">💡 Explanation: </span>
                                    ${code.explanation}
                                </p>
                            </div>

                            <div class="px-6 pb-6 flex gap-3">
                                <button id="copyBtn" class="flex items-center gap-2 flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors font-medium">
                                    📋 Copy Code
                                </button>
                                <button id="shareBtn" class="flex items-center gap-2 flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition-colors font-medium">
                                    🔗 Share
                                </button>
                                <button id="qrBtn" class="flex items-center gap-2 flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition-colors font-medium">
                                    📱 QR Code
                                </button>
                            </div>

                            <div id="qrContainer" class="hidden px-6 pb-6 border-t border-slate-700">
                                <div class="flex flex-col items-center gap-4">
                                    <p class="text-slate-300 text-sm">Scan to share with friends</p>
                                    <img src="${generateQRCode(window.location.href)}" alt="QR Code" class="border-4 border-slate-600 rounded">
                                    <button id="hideQrBtn" class="text-slate-400 hover:text-slate-300 text-sm">
                                        Hide QR Code
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-8 text-slate-500 text-sm">
                            <p>A new code snippet every day • Share with friends</p>
                        </div>
                    </div>
                </div>
            `;

            // Add event listeners
            document.getElementById('copyBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(code.code);
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = '📋 Copy Code';
                }, 2000);
            });

            document.getElementById('shareBtn').addEventListener('click', () => {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({
                        title: "Daily Code Burst",
                        text: `Check out today's code: ${code.title}`,
                        url: url
                    });
                } else {
                    navigator.clipboard.writeText(url);
                    alert("Link copied to clipboard!");
                }
            });

            document.getElementById('qrBtn').addEventListener('click', () => {
                document.getElementById('qrContainer').classList.toggle('hidden');
            });

            document.getElementById('hideQrBtn').addEventListener('click', () => {
                document.getElementById('qrContainer').classList.add('hidden');
            });
        }

        function initApp() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-6 flex items-center justify-center">
                    <div class="text-white">
                        <h1 class="text-2xl font-bold mb-2">Daily Code Burst</h1>
                        <p class="text-slate-400">Loading today's code...</p>
                    </div>
                </div>
            `;

            getTodaysCode().then(code => {
                renderApp(code);
            });
        }

        function renderApp(code) {
            const root = document.getElementById('root');
    </script>
</body>
</html>
